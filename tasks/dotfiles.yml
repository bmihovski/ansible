---
- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: https://github.com/bmihovski/.dotfiles.git
    dest: "{{ lookup('env', 'HOME') }}/Privatespace/.dotfiles"
    recursive: true
    update: true
    accept_hostkey: true
    version: mac-os
  tags: [dotfiles, stow]
- name: Cloning tmux plugin
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ lookup('env', 'HOME') }}/.tmux/plugins/tpm"
    recursive: true
    update: true
    accept_hostkey: true
    version: master
  tags: [dotfiles, stow]
- name: Stow dotfiles
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    ANSIBLE_VAULT_PASSWORD_FILE: "{{ lookup('env', 'HOME') }}/.vault_pass.txt"
  shell: cd $HOME/Privatespace/.dotfiles && ./mac && ./process decrypt
  tags: [dotfiles, stow]
