- name: install Rosetta2 required for non arm software
  become: false
  shell: softwareupdate --install-rosetta --agree-to-license
  tags: [install, core, brew]
- name: Installing SDK Man
  become: false
  shell: curl -s 'https://get.sdkman.io' | bash
  tags: [install, core]
- name: Installing Java
  shell: source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk install java 24.0.2-amzn
  become: false
  tags: [install, core]
