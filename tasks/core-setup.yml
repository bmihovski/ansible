# Installs [HomeBrew](https://brew.sh/) prompt
- name: Check if HomeBrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew
  tags: [install, core]
- name: Download & Install HomeBrew
  when: not brew.stat.exists
  block:
    - name: Download Installer Script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
        dest: /tmp/brew_install.sh
        mode: '775'
    - name: Run Installer Script
      become: false
      ansible.builtin.shell: NONINTERACTIVE=1 /tmp/brew_install.sh
  tags: [install, core]
- name: Set LinuxBrew Executable Path
  ansible.builtin.set_fact:
    linuxbrew_executable: /opt/homebrew/bin/brew
    linuxbrew_path: /opt/homebrew/bin
  tags: [install, core, brew]
- name: Install community.general collection
  command: ansible-galaxy collection install community.general
  register: install_general
  changed_when: '"Nothing to do." not in install_general.stdout'
  tags: [install, core]
- name: Check if Starship is installed
  ansible.builtin.stat:
    path: /Users/{{ lookup('env', 'USER') }}/.config/starship.toml
  register: starship
  tags: [install, core]
- name: Install
  when: not starship.stat.exists
  ansible.builtin.command: '{{ linuxbrew_executable }} install starship'
  environment:
    HOME: /Users/{{ lookup('env', 'USER') }}
  tags: [install, core]
- name: Install brew taps
  community.general.homebrew_tap:
    name:
      - ntrezowan/alacritty
      - oven-sh/bun
      - mikhailai/misc
      - jannis-baum/tap
  tags: install, core, brew]
